services:
  surveyking:
    image: surveyking/surveyking:latest
    container_name: surveyking-app
    restart: unless-stopped
    environment:
      MYSQL_PASSWORD: "${wizard_mysql_password:-surveyking}"
      JAVA_OPTS: "-Xms512m -Xmx1g -Dfile.encoding=UTF-8"
      TZ: "Asia/Shanghai"
    volumes:
      - "${TRIM_PKGVAR}/mysql:/var/lib/mysql"
      - "${TRIM_PKGVAR}/files:/app/files"
      - "${TRIM_PKGVAR}/logs:/app/logs"
    ports:
      - "${TRIM_SERVICE_PORT}:1991"
    networks:
      - surveyking_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:1991/health || exit 1"]
      timeout: 30s
      retries: 5
      start_period: 60s
      interval: 30s

networks:
  surveyking_network:
    driver: bridge